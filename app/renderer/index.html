<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self' vimp-artwork:;
        img-src 'self' data: vimp-artwork: blob:;

        object-src 'self';

        style-src 'self' 'unsafe-inline';
        connect-src 'self' vimp-artwork:;
      "
    />
    <title>Vimp</title>
  </head>

  <body class="h-screen max-h-screen overflow-clip">
    <div id="root"></div>
